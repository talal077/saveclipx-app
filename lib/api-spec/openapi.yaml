openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: video
    description: Video extraction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /x-video:
    post:
      operationId: fetchXVideo
      tags: [video]
      summary: Fetch X/Twitter video info and available formats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchXVideoRequest"
      responses:
        "200":
          description: Video info extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoInfo"
        "400":
          description: Invalid URL or unsupported content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    FetchXVideoRequest:
      type: object
      properties:
        url:
          type: string
          description: Public X/Twitter post URL
      required:
        - url
    VideoFormat:
      type: object
      description: >
        A selectable video format. Raw CDN/HLS URLs are never exposed to the
        client — use formatId + the original post URL with POST /api/download.
      properties:
        formatId:
          type: string
          description: yt-dlp internal format ID, pass this to /api/download
        quality:
          type: string
          description: Human-readable quality label e.g. 1080p
        ext:
          type: string
          description: Container extension e.g. mp4
        filesize:
          type: string
          nullable: true
          description: Human-readable file size if known
        height:
          type: integer
          nullable: true
          description: Video height in pixels
      required:
        - formatId
        - quality
        - ext
    VideoInfo:
      type: object
      properties:
        success:
          type: boolean
        title:
          type: string
        thumbnail:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
        uploader:
          type: string
          nullable: true
        formats:
          type: array
          items:
            $ref: "#/components/schemas/VideoFormat"
      required:
        - success
        - title
        - formats
    ApiError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true
      required:
        - error
